general {
    lock_cmd = omarchy-lock-screen                         
    before_sleep_cmd = loginctl lock-session               
    after_sleep_cmd = sleep 1 && hyprctl dispatch dpms on  # delay for PAM readiness, then turn on display.
    inhibit_sleep = 3                                      # wait until screen is locked
    # keep your explicit "respect inhibitors" behavior
    # ignore_dbus_inhibit = false
    # ignore_systemd_inhibit = false
}

listener {
    timeout = 180                                                        # 3min
    on-timeout = pidof hyprlock >/dev/null || omarchy-launch-screensaver # start screensaver
}
listener {
    timeout = 181                                           # 3min
    on-timeout = brightnessctl -sd '*::kbd_backlight' set 0 # save state and turn off keyboard backlight
    on-resume  = brightnessctl -rd '*::kbd_backlight'       # restore keyboard backlight
}

listener {
    timeout = 600                    # 10 minutes
    on-timeout = omarchy-lock-screen # lock screen and apps
}

listener {
    timeout = 601                                             # 10 minutes
    on-timeout = hyprctl dispatch dpms off                    # screen off when timeout has passed
    on-resume  = hyprctl dispatch dpms on && brightnessctl -r # screen on when activity is detected
}

# 30 min: suspend
listener {
    timeout = 1800                 # 30 minutes
    on-timeout = systemctl suspend # suspend system
}